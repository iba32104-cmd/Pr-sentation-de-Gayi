<style>
    /* General styling */
    body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(to right, #e0f7fa, #ffe082);
        color: #333;
    }

    /* Improved typography */
    h1, h2, h3, h4 {
        font-weight: 700;
        line-height: 1.5;
    }

    /* Spacing and padding */
    .container {
        padding: 20px;
        margin: auto;
    }

    /* Button styles */
    .btn {
        background-color: #4caf50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }
    .btn:hover {
        background-color: #45a049;
    }

    /* Card styles */
    .card {
        background: white;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        padding: 15px;
        margin: 10px;
        transition: transform 0.3s ease;
    }
    .card:hover {
        transform: scale(1.05);
    }

    /* Responsive grid for images */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 15px;
    }

    /* Table styling */
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th, td {
        padding: 10px;
        border: 1px solid #ddd;
    }
    tr:nth-child(even) {
        background-color: #f2f2f2;
    }
    tr:hover {
        background-color: #ddd;
    }

    /* Footer design */
    footer {
        background: #4caf50;
        color: white;
        text-align: center;
        padding: 15px;
        position: relative;
        bottom: 0;
        width: 100%;
    }

    /* Media queries for better mobile responsiveness */
    @media (max-width: 600px) {
        .btn {
            width: 100%;
        }
        .card {
            margin: 5px 0;
        }
    }
</style>
